<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManager | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</head>
<body>
    <div class="principale">
        <div class="dashboard">

            <h1><span>Educ</span>Manager</h1>
            <p class="title1">(plateforme de gestion des etudiants)</p>

            <button id="add-student-btn">Ajouter Étudiant</button>

            <form id="student-form" style="display: none;">
                <p class="title2">Ajouter un Etudiant.</p>
                <label for="photo">Photo (URL)</label><br>
                <input type="url" id="photo" name="photo" placeholder="ex: https://example.com/photo.jpg"><br>

                <label for="name">Nom</label><br>
                <input type="text" id="name" name="name" placeholder="ex: Tachago" required><br>

                <label for="prenom">Prenom</label><br>
                <input type="text" id="prenom" name="prenom" placeholder="ex: Daniel" required><br>

                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" placeholder="ex:xxxxx@gmail.com"><br>

                <label for="age">Age</label><br>
                <input type="number" id="age" name="age" placeholder="ex: 23" required><br>

                <label for="filiere">Filiere</label><br>
                <select name="filiere" id="filiere" required>
                    <option value="Informatique">Informatique</option>
                    <option value="Mathematique">Mathematique</option>
                    <option value="Physique">Physique</option>
                    <option value="Chimie">Chimie</option>
                </select><br>
                <button type="submit" id="submit-btn">Enregistrer</button>
                <button type="button" id="cancel-btn" style="display: none;">Annuler</button>
                
            </form>
        </div>
        <div class="liste">
            <h2>Liste des Etudiants</h2>
            <p id="inscrit-count"> 0 Etudiant(s) inscrit(s)</p>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Rechercher un étudiant...">
                <button id="toggle-list-btn">Afficher Liste</button>
            </div>
            <div id="student-cards" style="display: none;">
                <!-- Les cartes des étudiants seront insérées ici -->
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
